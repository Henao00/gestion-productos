<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Productos{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300&family=IBM+Plex+Mono:wght@400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f8f7f4;
            --surface: #ffffff;
            --ink: #1a1916;
            --ink-2: #6b6760;
            --ink-3: #b0ada8;
            --line: #e8e5e0;
            --line-2: #d4d0ca;
            --accent: #c84b2f;
            --accent-bg: #fdf1ee;
            --green: #2a7a50;
            --green-bg: #edf7f2;
            --amber: #b06a10;
            --amber-bg: #fef5e7;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'Geist', sans-serif;
            --serif: 'Fraunces', serif;
            --r: 6px;
            --r-lg: 10px;
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            font-size: 14px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── LAYOUT ─── */
        .app { display: flex; min-height: 100vh; }

        /* ─── SIDEBAR ─── */
        .sidebar {
            width: 220px;
            flex-shrink: 0;
            background: var(--ink);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 50;
        }

        .sidebar-brand {
            padding: 28px 24px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .brand-eyebrow {
            font-family: var(--mono);
            font-size: 9px;
            letter-spacing: 0.15em;
            color: rgba(255,255,255,0.35);
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .brand-name {
            font-family: var(--serif);
            font-size: 20px;
            font-weight: 400;
            color: #fff;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }
        .brand-name em {
            font-style: italic;
            color: #e8a090;
        }

        .sidebar-nav { padding: 16px 12px; flex: 1; }

        .nav-section-label {
            font-family: var(--mono);
            font-size: 9px;
            letter-spacing: 0.12em;
            color: rgba(255,255,255,0.25);
            text-transform: uppercase;
            padding: 0 12px;
            margin: 8px 0 6px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: var(--r);
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            font-size: 13.5px;
            font-weight: 400;
            transition: all 0.12s ease;
            margin-bottom: 2px;
        }
        .nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.9); }
        .nav-item.active { background: rgba(255,255,255,0.1); color: #fff; }
        .nav-icon {
            width: 16px; height: 16px;
            opacity: 0.7;
            flex-shrink: 0;
        }
        .nav-item.active .nav-icon { opacity: 1; }

        .sidebar-footer {
            padding: 16px 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-footer-text {
            font-family: var(--mono);
            font-size: 10px;
            color: rgba(255,255,255,0.2);
        }

        /* ─── MAIN ─── */
        .main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; }

        /* ─── TOPBAR ─── */
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--line);
            padding: 0 36px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 40;
        }
        .topbar-breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--ink-2);
        }
        .topbar-breadcrumb span { color: var(--line-2); }
        .topbar-breadcrumb strong { color: var(--ink); font-weight: 500; }
        .topbar-actions { display: flex; align-items: center; gap: 10px; }

        /* ─── PAGE ─── */
        .page { padding: 36px; max-width: 1080px; }

        .page-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 32px;
        }
        .page-title {
            font-family: var(--serif);
            font-size: 30px;
            font-weight: 300;
            letter-spacing: -0.03em;
            line-height: 1.15;
            color: var(--ink);
        }
        .page-title em { font-style: italic; color: var(--accent); }
        .page-meta {
            font-size: 12.5px;
            color: var(--ink-3);
            margin-top: 4px;
            font-family: var(--mono);
        }

        /* ─── MESSAGES ─── */
        .messages { margin-bottom: 24px; }
        .alert {
            padding: 11px 16px;
            border-radius: var(--r);
            font-size: 13.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .alert-success {
            background: var(--green-bg);
            color: var(--green);
            border: 1px solid #b8e0cc;
        }
        .alert-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--green);
            flex-shrink: 0;
        }

        /* ─── BUTTONS ─── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--r);
            font-size: 13.5px;
            font-weight: 500;
            font-family: var(--sans);
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: all 0.12s ease;
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--ink);
            color: #fff;
        }
        .btn-primary:hover { background: #2d2c28; }
        .btn-outline {
            background: transparent;
            color: var(--ink-2);
            border: 1px solid var(--line-2);
        }
        .btn-outline:hover { border-color: var(--ink-3); color: var(--ink); background: var(--bg); }
        .btn-danger-soft {
            background: var(--accent-bg);
            color: var(--accent);
            border: 1px solid #f5c5b8;
        }
        .btn-danger-soft:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-sm { padding: 5px 11px; font-size: 12.5px; }
        .btn-icon {
            width: 32px; height: 32px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* ─── STATS ─── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }
        .stat {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--r-lg);
            padding: 20px 22px;
            position: relative;
            overflow: hidden;
        }
        .stat::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
        }
        .stat.s-neutral::before { background: var(--line-2); }
        .stat.s-green::before { background: var(--green); }
        .stat.s-amber::before { background: var(--amber); }

        .stat-label {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-3);
            margin-bottom: 10px;
        }
        .stat-value {
            font-family: var(--serif);
            font-size: 32px;
            font-weight: 300;
            letter-spacing: -0.04em;
            color: var(--ink);
            line-height: 1;
        }
        .stat-sub {
            font-size: 11.5px;
            color: var(--ink-3);
            margin-top: 6px;
        }

        /* ─── TOOLBAR ─── */
        .toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
        }
        .search-wrap { position: relative; }
        .search-wrap input {
            padding: 8px 14px 8px 36px;
            border: 1px solid var(--line-2);
            border-radius: var(--r);
            font-family: var(--sans);
            font-size: 13.5px;
            background: var(--surface);
            color: var(--ink);
            outline: none;
            width: 240px;
            transition: border-color 0.12s;
        }
        .search-wrap input:focus { border-color: var(--ink-3); }
        .search-wrap input::placeholder { color: var(--ink-3); }
        .search-ico {
            position: absolute;
            left: 11px; top: 50%;
            transform: translateY(-50%);
            width: 14px; height: 14px;
            color: var(--ink-3);
            pointer-events: none;
        }
        .filter-select {
            padding: 8px 12px;
            border: 1px solid var(--line-2);
            border-radius: var(--r);
            font-family: var(--sans);
            font-size: 13.5px;
            background: var(--surface);
            color: var(--ink);
            outline: none;
            cursor: pointer;
        }
        .filter-select:focus { border-color: var(--ink-3); }
        .toolbar-spacer { flex: 1; }

        /* ─── TABLE ─── */
        .table-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--r-lg);
            overflow: hidden;
        }
        .table-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .table-header-label {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-3);
        }
        .table-header-count {
            font-size: 12px;
            color: var(--ink-3);
        }
        table { width: 100%; border-collapse: collapse; }
        thead tr { border-bottom: 1px solid var(--line); }
        th {
            padding: 10px 16px;
            text-align: left;
            font-family: var(--mono);
            font-size: 9.5px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-3);
            background: #faf9f7;
        }
        td {
            padding: 13px 16px;
            font-size: 13.5px;
            border-bottom: 1px solid var(--line);
            vertical-align: middle;
            color: var(--ink);
        }
        tr:last-child td { border-bottom: none; }
        tbody tr { transition: background 0.08s; }
        tbody tr:hover td { background: #faf9f7; }

        .prod-id {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--ink-3);
        }
        .prod-name { font-weight: 500; font-size: 13.5px; }
        .prod-desc {
            font-size: 12px;
            color: var(--ink-3);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }
        .price {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 500;
        }
        .stock-val {
            font-family: var(--mono);
            font-size: 12.5px;
            color: var(--ink-2);
        }

        /* BADGES */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            font-family: var(--mono);
            letter-spacing: 0.02em;
        }
        .badge-active { background: var(--green-bg); color: var(--green); }
        .badge-inactive { background: #f3f2ef; color: var(--ink-3); }
        .badge-cat { background: #f0eeff; color: #5040aa; }
        .badge-dot { width: 5px; height: 5px; border-radius: 50%; }
        .badge-active .badge-dot { background: var(--green); }
        .badge-inactive .badge-dot { background: var(--ink-3); }

        /* ACTIONS */
        .row-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.1s; }
        tbody tr:hover .row-actions { opacity: 1; }

        /* EMPTY */
        .empty {
            text-align: center;
            padding: 64px 24px;
        }
        .empty-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            background: var(--bg);
            border: 1px solid var(--line);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .empty-title {
            font-family: var(--serif);
            font-size: 20px;
            font-weight: 300;
            color: var(--ink-2);
            margin-bottom: 6px;
        }
        .empty-sub { font-size: 13px; color: var(--ink-3); }

        /* ─── FORM ─── */
        .form-wrap { max-width: 620px; }
        .form-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--r-lg);
            overflow: hidden;
        }
        .form-section {
            padding: 24px 28px;
            border-bottom: 1px solid var(--line);
        }
        .form-section:last-child { border-bottom: none; }
        .form-section-title {
            font-family: var(--mono);
            font-size: 9.5px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-3);
            margin-bottom: 18px;
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full { grid-column: 1 / -1; }
        label {
            font-size: 12px;
            font-weight: 500;
            color: var(--ink-2);
        }
        .form-input {
            padding: 9px 13px;
            border: 1px solid var(--line-2);
            border-radius: var(--r);
            font-family: var(--sans);
            font-size: 13.5px;
            color: var(--ink);
            background: var(--surface);
            outline: none;
            transition: border-color 0.12s, box-shadow 0.12s;
            width: 100%;
        }
        .form-input:focus {
            border-color: var(--ink-3);
            box-shadow: 0 0 0 3px rgba(26,25,22,0.06);
        }
        textarea.form-input { resize: vertical; min-height: 90px; }
        .error-msg { font-size: 12px; color: var(--accent); }

        .checkbox-field {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 13px;
            border: 1px solid var(--line-2);
            border-radius: var(--r);
            cursor: pointer;
            transition: border-color 0.12s;
        }
        .checkbox-field:hover { border-color: var(--ink-3); }
        .form-checkbox { width: 15px; height: 15px; accent-color: var(--green); cursor: pointer; }
        .checkbox-label { font-size: 13.5px; color: var(--ink); cursor: pointer; }

        .form-footer {
            padding: 18px 28px;
            background: #faf9f7;
            border-top: 1px solid var(--line);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* ─── CONFIRM DELETE ─── */
        .confirm-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--r-lg);
            padding: 28px;
            max-width: 440px;
        }
        .confirm-icon {
            width: 40px; height: 40px;
            background: var(--accent-bg);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 16px;
        }
        .confirm-title {
            font-family: var(--serif);
            font-size: 20px;
            font-weight: 300;
            margin-bottom: 8px;
        }
        .confirm-text { font-size: 13.5px; color: var(--ink-2); line-height: 1.6; margin-bottom: 20px; }
        .confirm-actions { display: flex; gap: 8px; }

        /* ANIM */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .page { animation: fadeUp 0.22s ease; }
    </style>
</head>
<body>
<div class="app">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-eyebrow">Sistema</div>
            <div class="brand-name">Gestión de<br><em>Productos</em></div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section-label">Inventario</div>
            <a href="/" class="nav-item {% block nav_lista %}{% endblock %}">
                <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="1.5" y="2.5" width="13" height="11" rx="1.5"/>
                    <line x1="1.5" y1="6" x2="14.5" y2="6"/>
                    <line x1="5" y1="9" x2="11" y2="9"/>
                    <line x1="5" y1="11.5" x2="9" y2="11.5"/>
                </svg>
                Lista de productos
            </a>
            <a href="/nuevo/" class="nav-item {% block nav_nuevo %}{% endblock %}">
                <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="8" cy="8" r="6"/>
                    <line x1="8" y1="5" x2="8" y2="11"/>
                    <line x1="5" y1="8" x2="11" y2="8"/>
                </svg>
                Nuevo producto
            </a>
            <div class="nav-section-label" style="margin-top:16px;">Sistema</div>
            <a href="/admin/" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="8" cy="5.5" r="2.5"/>
                    <path d="M2.5 13.5c0-3 2.5-4.5 5.5-4.5s5.5 1.5 5.5 4.5"/>
                </svg>
                Panel admin
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-footer-text">v1.0 · Django</div>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
        <header class="topbar">
            <div class="topbar-breadcrumb">
                <span>Sistema</span>
                <span>›</span>
                <strong>{% block breadcrumb %}Inventario{% endblock %}</strong>
            </div>
            <div class="topbar-actions">
                <a href="/nuevo/" class="btn btn-primary btn-sm">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/>
                    </svg>
                    Nuevo
                </a>
            </div>
        </header>

        <div class="page">
            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="alert alert-success">
                    <div class="alert-dot"></div>
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </div>
</div>
</body>
</html>
